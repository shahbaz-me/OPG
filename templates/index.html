<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teeth Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            color: #333;
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
            color: #007bff;
        }
        .upload-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        .upload-btn-wrapper {
            margin: 20px 0;
        }
        input[type="file"] {
            display: none;
        }
        label {
            background-color: #007bff;
            color: #fff;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            font-weight: 600;
            font-size: 1rem;
        }
        label:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .format-selection {
            margin: 20px 0;
            text-align: center; /* Center align the format selection */
        }
        .format-label {
            margin-right: 10px;
            font-weight: 600;
        }
        .selected-format {
            display: inline-block;
            padding: 8px 15px;
            border: 1px solid #007bff;
            border-radius: 5px;
            background-color: #e7f0ff;
            color: #007bff;
            font-weight: bold;
            margin-top: 10px;
        }
        .preview-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }
        .preview-image {
            width: 100px;
            height: 100px;
            margin: 10px;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: transform 0.3s;
        }
        .preview-image:hover {
            transform: scale(1.05);
        }
        .preview-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-image .remove-btn {
            position: absolute;
            top: 0;
            right: 0;
            background-color: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .preview-image .remove-btn:hover {
            background-color: darkred;
        }
        .results-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .result-image {
            margin: 10px;
            max-width: 250px;
            border-radius: 8px;
            transition: transform 0.3s;
        }
        .result-image:hover {
            transform: scale(1.05);
        }
        button[type="submit"] {
            padding: 12px 25px;
            border: none;
            background-color: #28a745;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
            font-size: 1rem;
        }
        button[type="submit"]:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>Teeth Detection</h1>

    <div class="upload-container">
        <form method="post" enctype="multipart/form-data">
            <div class="upload-btn-wrapper">
                <label for="file-upload">Select Images</label>
                <input id="file-upload" type="file" name="files[]" accept="image/*" multiple required>
            </div>

            <div class="format-selection">
                <span class="format-label">Select Teeth Numbering Format:</span>
                <select id="format-select" name="teeth_format" onchange="updateSelectedFormat()">
                    <option value="UTN">Universal Teeth Numbering (UTN)</option>
                    <option value="FDI">Fédération Dentaire Internationale (FDI)</option>
                </select>
                <div id="selected-format" class="selected-format">Universal Teeth Numbering (UTN)</div>
            </div>

            <div class="preview-container" id="preview-container"></div>

            <button type="submit">Proceed</button>
        </form>

        <div class="results-container">
            {% if result_paths %}
                <h2>Detected Images:</h2>
                {% for result_path in result_paths %}
                    <div>
                        <a href="{{ url_for('view_image', image_path=result_path) }}">
                            <img src="{{ url_for('static', filename=result_path) }}" class="result-image" alt="Detected Teeth Image">
                        </a>
                        <p>{{ result_path.split('/')[-1] }}</p>
                    </div>
                {% endfor %}
            {% endif %}
        </div>
    </div>

    <div class="footer">
        <p>All rights reserved © 2024</p>
    </div>

    <script>
        const fileInput = document.getElementById('file-upload');
        const previewContainer = document.getElementById('preview-container');
        const selectedFormatDiv = document.getElementById('selected-format');
        let selectedFiles = [];

        fileInput.addEventListener('change', function() {
            const files = Array.from(fileInput.files);
            selectedFiles = selectedFiles.concat(files);
            previewContainer.innerHTML = '';

            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();

                reader.onload = function(e) {
                    const previewImageDiv = document.createElement('div');
                    previewImageDiv.classList.add('preview-image');
                    const previewImage = document.createElement('img');
                    previewImage.src = e.target.result;

                    const removeBtn = document.createElement('button');
                    removeBtn.innerText = '×';
                    removeBtn.classList.add('remove-btn');
                    removeBtn.addEventListener('click', function() {
                        selectedFiles.splice(index, 1);
                        previewImageDiv.remove();
                    });

                    previewImageDiv.appendChild(previewImage);
                    previewImageDiv.appendChild(removeBtn);
                    previewContainer.appendChild(previewImageDiv);
                }

                reader.readAsDataURL(file);
            });
        });

        function updateSelectedFormat() {
            const formatSelect = document.getElementById('format-select');
            const selectedOption = formatSelect.options[formatSelect.selectedIndex].text;
            selectedFormatDiv.textContent = selectedOption;
        }
    </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teeth Detection Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative; /* For positioning child elements */
        }
        h1 {
            color: #333;
            font-size: 2.5rem;
            margin: 20px 0;
            text-align: center; /* Center header */
        }
        .image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        .result-image {
            max-width: 100%;
            height: auto;
            margin: 10px 0;
            transition: transform 0.2s ease; /* Smooth animation */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* Depth effect */
            border-radius: 10px; /* Rounded corners */
            border: 2px solid #ddd; /* Light border */
            transform-origin: center; /* Zoom from center */
        }
        .image-name {
            margin-top: 10px;
            color: #666;
            font-size: 1.2rem;
            text-align: center;
            font-weight: 600; /* Bold text */
        }
        .back-button {
            padding: 12px 25px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 20px 0;
            font-size: 1rem; /* Button font size */
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.2); /* Shadow effect */
        }
        .back-button:hover {
            background-color: #0056b3;
        }
        .zoom-message {
            margin-top: 10px; /* Space from the button */
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            font-size: 1rem;
            color: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            text-align: center; /* Center message text */
            width: 200px; /* Fixed width for the message */
        }
    </style>
</head>
<body>
    <h1>Detected Images</h1>

    <div class="image-container">
        {% for result_path in result_paths %}
            <div>
                <img src="{{ url_for('static', filename=result_path) }}" class="result-image" id="zoom-image" onwheel="zoomImage(event)">
                <div class="image-name">{{ result_path.split('/')[-1] }}</div>
            </div>
        {% endfor %}
    </div>

    <button class="back-button" onclick="window.history.back();">Back to Gallery</button>

    <div class="zoom-message">Scroll to zoom in/out</div> <!-- Moved here -->

    <script>
        const image = document.getElementById('zoom-image');
        let scale = 1; // Initial scale

        function zoomImage(event) {
            event.preventDefault(); // Prevent default scroll behavior
            if (event.deltaY < 0) {
                scale = Math.min(scale + 0.1, 3); // Zoom in
            } else {
                scale = Math.max(scale - 0.1, 1); // Zoom out
            }
            image.style.transform = `scale(${scale})`; // Apply zoom
        }
    </script>
</body>
</html>
